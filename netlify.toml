[build]
  base = "frontend"
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"
  VITE_API_URL = "https://pequeletores-production.up.railway.app"

# SPA routing — all routes redirect to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200